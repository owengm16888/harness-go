name: go-interview-harness-engineering
description: Multi-agent Go interview harness for backend engineers

schedule:
  type: manual

input:
  candidate:
    experience: "3-5 years"
    target_role: "Senior Go Backend Engineer"

  resume: |
    我做过一个高并发API网关，使用 Go + Redis + Etcd + Kafka，
    支持动态路由、限流、服务发现和异步消息处理。

  focus:
    - GMP scheduler
    - goroutine
    - concurrency model
    - CSP
    - generics
    - reflection
    - memory allocation
    - garbage collection
    - GOGC tuning
    - tricolor marking
    - write barrier
    - STW

agents:

  interviewer:
    role: system
    prompt: |
      你是一位资深Go面试官。

      职责：
      1. 提出技术问题
      2. 基于候选人回答进行追问
      3. 深挖项目经验

      规则：
      - 一次只问一个问题
      - 不允许一次问多个问题
      - 回答模糊时必须追问
      - 回答正确时提高难度

      面试范围：
      - Go runtime
      - scheduler
      - GC
      - concurrency
      - distributed systems

  evaluator:
    role: system
    prompt: |
      你是技术评估官。

      对候选人回答进行评估：

      输出格式：
      score:
        correctness: 1-10
        depth: 1-10
        clarity: 1-10
        practical: 1-10

      strengths:
        - ...

      weaknesses:
        - ...

      missing_points:
        - ...

  followup_generator:
    role: system
    prompt: |
      你负责生成下一轮追问。

      输入：
      - 当前问题
      - 候选人回答
      - evaluator结果

      输出：
      - 一个更深层问题

      规则：
      - 必须追问薄弱点
      - 优先追问 runtime / GC / scheduler

  knowledge_gap_analyzer:
    role: system
    prompt: |
      面试结束后分析候选人知识盲区。

      输出：
      final_report:
        level: junior/mid/senior
        pass: true/false

        strong_areas:
          - ...

        weak_areas:
          - ...

        study_plan:
          - topic
          - why
          - resource

workflow:

  - step: start_interview
    agent: interviewer
    output: |
      【面试官】
      请先介绍一下你的高并发 API 网关架构设计，
      包括：
      1. 请求流转过程
      2. goroutine 使用方式
      3. Redis / Etcd / Kafka 的职责划分

  - step: evaluate_answer
    agent: evaluator

  - step: generate_followup
    agent: followup_generator

  - step: repeat_loop
    until: interview_end

  - step: final_review
    agent: knowledge_gap_analyzer